<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Novel Weaver — AI Novel Writing App</title>
  <meta name="description"
    content="Novel Weaver helps you turn a rough story idea into a fully written novel. Develop characters, build plots, and write chapters — all with an AI writing partner." />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=Merriweather:ital,wght@0,300;0,400;0,700;1,400&display=swap"
    rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // Apply dark mode before render
    document.documentElement.classList.add('dark');

    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            serif: ['Merriweather', 'serif'],
            display: ['Outfit', 'sans-serif'],
          },
          animation: {
            'fade-in': 'fadeIn 0.5s ease-out',
            'slide-up': 'slideUp 0.5s ease-out',
            'slide-right': 'slideRight 0.3s ease-out',
            'float': 'float 6s ease-in-out infinite',
            'pulse-soft': 'pulseSoft 2s ease-in-out infinite',
            'shimmer': 'shimmer 2s linear infinite',
            'glow': 'glow 3s ease-in-out infinite',
            'breathe': 'breathe 4s ease-in-out infinite',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            slideUp: {
              '0%': { transform: 'translateY(20px)', opacity: '0' },
              '100%': { transform: 'translateY(0)', opacity: '1' },
            },
            slideRight: {
              '0%': { transform: 'translateX(-16px)', opacity: '0' },
              '100%': { transform: 'translateX(0)', opacity: '1' },
            },
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-8px)' },
            },
            pulseSoft: {
              '0%, 100%': { opacity: '1' },
              '50%': { opacity: '0.6' },
            },
            shimmer: {
              '0%': { backgroundPosition: '-200% 0' },
              '100%': { backgroundPosition: '200% 0' },
            },
            glow: {
              '0%, 100%': { boxShadow: '0 0 20px rgba(232, 160, 98, 0.15)' },
              '50%': { boxShadow: '0 0 40px rgba(232, 160, 98, 0.25)' },
            },
            breathe: {
              '0%, 100%': { transform: 'scale(1)' },
              '50%': { transform: 'scale(1.05)' },
            },
          },
          colors: {
            'ink': {
              DEFAULT: '#0f0e17',
              50: '#1a1926',
              100: '#151421',
              200: '#1e1d2d',
              300: '#272636',
              400: '#2f2e40',
              500: '#3d3c4e',
            },
            'warm': {
              DEFAULT: '#e8a062',
              light: '#f0be8a',
              dim: '#c08040',
              soft: '#e8a062',
              glow: 'rgba(232, 160, 98, 0.15)',
              subtle: 'rgba(232, 160, 98, 0.08)',
            },
            'gold': {
              DEFAULT: '#e8a062',
              light: '#f0be8a',
              dim: '#c08040',
              glow: 'rgba(232, 160, 98, 0.15)',
            },
            'parchment': {
              DEFAULT: '#ebe5df',
              dim: '#8a8598',
              faint: '#4d4a5c',
            },
            'sage': {
              DEFAULT: '#7eb89a',
              light: '#a5d4bb',
              dim: '#5a9c7a',
            },
            'rose': {
              DEFAULT: '#d4838a',
              light: '#e8a5ab',
              dim: '#b86068',
            },
            'lavender': {
              DEFAULT: '#9b8ec4',
              light: '#b5aad6',
            },
          },
        },
      },
    }
  </script>
  <script src="https://unpkg.com/jspdf@latest/dist/jspdf.umd.min.js"></script>
  <script src="https://unpkg.com/docx@8.5.0/build/index.js"></script>
  <script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "docx": "https://aistudiocdn.com/docx@^9.5.1"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
</head>

<body class="bg-ink text-parchment h-screen w-screen overflow-hidden">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
