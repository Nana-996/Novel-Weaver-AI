<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Novel Weaver — AI-Powered Novel Writing App</title>
  <meta name="description"
    content="Novel Weaver helps you turn a rough story idea into a fully written novel. Develop characters, build plots, and write chapters — all with an AI co-author that writes with you." />

  <!-- Open Graph / Social Sharing -->
  <meta property="og:title" content="Novel Weaver — Write Your Novel with AI" />
  <meta property="og:description" content="Turn your rough story ideas into fully written novels. AI-powered co-author that develops characters, builds plots, and writes chapters alongside you." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://novel-weaver.app" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Novel Weaver — AI Novel Writing App" />
  <meta name="twitter:description" content="Write your novel with an AI co-author. Characters, plots, chapters — all from a conversation." />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=Merriweather:ital,wght@0,300;0,400;0,700;1,400&display=swap"
    rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // Apply dark mode before render
    document.documentElement.classList.add('dark');

    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            serif: ['Merriweather', 'serif'],
            display: ['Outfit', 'sans-serif'],
          },
          animation: {
            'fade-in': 'fadeIn 0.5s ease-out',
            'slide-up': 'slideUp 0.5s ease-out',
            'slide-right': 'slideRight 0.3s ease-out',
            'float': 'float 6s ease-in-out infinite',
            'pulse-soft': 'pulseSoft 2s ease-in-out infinite',
            'shimmer': 'shimmer 2s linear infinite',
            'glow': 'glow 3s ease-in-out infinite',
            'breathe': 'breathe 4s ease-in-out infinite',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            slideUp: {
              '0%': { transform: 'translateY(20px)', opacity: '0' },
              '100%': { transform: 'translateY(0)', opacity: '1' },
            },
            slideRight: {
              '0%': { transform: 'translateX(-16px)', opacity: '0' },
              '100%': { transform: 'translateX(0)', opacity: '1' },
            },
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-8px)' },
            },
            pulseSoft: {
              '0%, 100%': { opacity: '1' },
              '50%': { opacity: '0.6' },
            },
            shimmer: {
              '0%': { backgroundPosition: '-200% 0' },
              '100%': { backgroundPosition: '200% 0' },
            },
            glow: {
              '0%, 100%': { boxShadow: '0 0 20px rgba(232, 160, 98, 0.15)' },
              '50%': { boxShadow: '0 0 40px rgba(232, 160, 98, 0.25)' },
            },
            breathe: {
              '0%, 100%': { transform: 'scale(1)' },
              '50%': { transform: 'scale(1.05)' },
            },
          },
          colors: {
            'ink': {
              DEFAULT: '#f2eee4', // Crisp, clean light background
              50: '#ebe6d8',
              100: '#e0dac9', // Inputs and cards
              200: '#d1cab5', // Hover states
              300: '#a39c87', // Deeper backgrounds
              400: '#000000', // Pure black so opacity classes (e.g., border-ink-400/20) produce clear borders
              500: '#000000',
            },
            'warm': {
              DEFAULT: '#c2410c', // Darker, punchier terracotta
              light: '#ea580c',
              dim: '#9a3412',
              soft: '#c2410c',
              glow: 'rgba(194, 65, 12, 0.15)',
              subtle: 'rgba(194, 65, 12, 0.08)',
            },
            'gold': {
              DEFAULT: '#c2410c',
              light: '#ea580c',
              dim: '#9a3412',
              glow: 'rgba(194, 65, 12, 0.15)',
            },
            'parchment': {
              DEFAULT: '#000000', // Pure black text for maximum contrast
              dim: '#1f1f1f',     // Very dark gray for secondary text
              faint: '#3d3d3d',   // Dark gray for tertiary text
            },
            'sage': {
              DEFAULT: '#166534', // Deep green
              light: '#22c55e',
              dim: '#14532d',
            },
            'rose': {
              DEFAULT: '#be123c', // Deep red
              light: '#fb7185',
              dim: '#881337',
            },
            'lavender': {
              DEFAULT: '#4338ca', // Deep purple
              light: '#818cf8',
            },
          },
        },
      },
    }
  </script>
  <script src="https://unpkg.com/jspdf@latest/dist/jspdf.umd.min.js"></script>
  <script src="https://unpkg.com/docx@8.5.0/build/index.js"></script>
  <link rel="stylesheet" href="/index.css">
</head>

<body class="bg-ink text-parchment h-screen w-screen overflow-hidden">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
